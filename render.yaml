services:
  - type: web
    name: neon-mecha-arena
    runtime: node
    plan: free
    region: singapore
    branch: main
    autoDeploy: true
    buildCommand: npm ci --omit=dev
    startCommand: node src/server.js
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PUBLIC_ORIGIN
        value: https://neon-mecha-arena.onrender.com
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_TOKEN
        sync: false
