<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NEON MECHA ARENA</title>
    <link rel="stylesheet" href="/shared.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="brand">
          <div class="mark" aria-hidden="true"></div>
          <div>
            <h1>NEON MECHA ARENA</h1>
            <p>TikTok LIVE 限量席位互動機甲戰場</p>
          </div>
        </div>
        <span class="status-pill" id="health"><span class="dot"></span><span>checking</span></span>
      </header>

      <section class="grid three">
        <article class="panel">
          <div class="panel-header">
            <h2>玩家入口</h2>
          </div>
          <div class="panel-body stack">
            <p class="muted">請使用主播提供的玩家連結或直播 QR code 登記席位。滿席時會自動進入候補，不需要也不能進入後台。</p>
            <div class="notice">玩家連結格式：/join/場次ID</div>
          </div>
        </article>

        <article class="panel">
          <div class="panel-header">
            <h2>候補流程</h2>
          </div>
          <div class="panel-body stack">
            <p class="muted">候補只在玩家頁完成登記。請保持頁面開啟，下一個空位會自動補位；對戰開始後可用候補干預按鈕參與戰局。</p>
            <div class="notice">候補沒有 Admin Token，也沒有後台入口。</div>
          </div>
        </article>

        <article class="panel">
          <div class="panel-header">
            <h2>直播觀看</h2>
          </div>
          <div class="panel-body stack">
            <p class="muted">觀眾在 TikTok 看主播直播。需要參與場外干預時，使用主播提供的觀戰連結短暫切換操作即可。</p>
            <div class="notice">後台僅限場主本人使用。</div>
          </div>
        </article>
      </section>
    </main>
    <script>
      fetch("/healthz")
        .then((res) => res.json())
        .then((data) => {
          const health = document.querySelector("#health");
          health.querySelector(".dot").className = "dot ok";
          health.querySelector("span:last-child").textContent = `online · ${data.tickRate}Hz`;
        })
        .catch(() => {
          const health = document.querySelector("#health");
          health.querySelector(".dot").className = "dot bad";
          health.querySelector("span:last-child").textContent = "offline";
        });
    </script>
  </body>
</html>
